<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhodium Style Homepage</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="container">

    <div class="logo">
    <img src="assets/cloakzone-logo.png" alt="CloakZone Logo">
</div>

<h1>CloakZone</h1>

<p class="subtitle">
    Gaming • Apps • Entertainment
</p>

        <form class="search-box" action="https://www.google.com/search" method="GET">
            <input
                type="text"
                name="q"
                placeholder="Search the web freely"
                autocomplete="off"
            >
        </form>

        <div class="apps">

            <a href="#" class="app">
                <div class="icon">🎮</div>
                <span>Games</span>
            </a>

            <a href="#" class="app">
                <div class="icon">📦</div>
                <span>Apps</span>
            </a>

            <a href="#" class="app">
                <div class="icon">🎵</div>
                <span>Music</span>
            </a>

            <a href="#" class="app">
                <div class="icon">🎬</div>
                <span>Movies</span>
            </a>

            <a href="#" class="app">
                <div class="icon">+</div>
                <span>Add New</span>
            </a>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
